<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <title>SKTraderz Logo</title>
  <desc>SKTraderz logistics brand logo - Hexagon Shield concept</desc>

  <!-- Outer hex ring -->
  <polygon points="250,40 330,86 330,178 250,224 170,178 170,86" fill="#0C447C"/>

  <!-- Inner hex body -->
  <polygon points="250,54 316,92 316,168 250,206 184,168 184,92" fill="#185FA5"/>

  <!-- Inner hex accent lines -->
  <line x1="250" y1="54" x2="250" y2="206" stroke="#0C447C" stroke-width="1" opacity="0.3"/>
  <line x1="184" y1="92" x2="316" y2="168" stroke="#0C447C" stroke-width="1" opacity="0.3"/>
  <line x1="316" y1="92" x2="184" y2="168" stroke="#0C447C" stroke-width="1" opacity="0.3"/>

  <!-- SK monogram -->
  <text x="195" y="162" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="58" fill="#ffffff" letter-spacing="-3">SK</text>

  <!-- Wordmark: TRADERZ -->
  <text x="250" y="272" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="40" fill="#185FA5" letter-spacing="3">TRADERZ</text>

  <!-- Rule lines flanking LOGISTICS -->
  <line x1="96" y1="292" x2="178" y2="292" stroke="#185FA5" stroke-width="1.2"/>
  <line x1="322" y1="292" x2="404" y2="292" stroke="#185FA5" stroke-width="1.2"/>

  <!-- Sub-label -->
  <text x="250" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#185FA5" letter-spacing="5">LOGISTICS</text>

  <!-- Tagline -->
  <text x="250" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="12" fill="#888780" letter-spacing="1">Strength. Precision. Delivery.</text>
</svg>
